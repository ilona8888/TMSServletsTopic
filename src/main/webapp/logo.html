<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Иконка TMS</title>
    <style>
        div {
            background-color: black;
            display: inline-block; /*ширина по контенту внутри тега*/
        }

        span {
            color: white;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
<div>
    <span style="color: yellow">&lt;</span> <!-- символ "<"   -->
    <span>
        Teach<br>
        Me<br>
        Skills
    </span>
    <span style="color: yellow">&#47;</span> <!-- символ "/"   -->
    <span style="color: yellow">&gt;</span> <!-- символ ">"   -->


</div>
</body>
</html>
